<!-- 
  DROP-IN PAYMENT SCRIPT FOR booking.html
  Replace the existing <script> block in booking.html with this.
  Also add Razorpay SDK before this script:
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
-->
<script>
    // ── BACKEND URL — change to Railway URL after deploy ──
    const BACKEND_URL = 'http://localhost:3000';

    let booking = {};
    let firestoreBookingId = null;

    window.addEventListener('load', () => {
      const saved = localStorage.getItem('pendingBooking');
      if (saved) {
        booking = JSON.parse(saved);
      } else {
        booking = {
          listingTitle: 'Rooftop Pool with City View',
          date:         new Date().toISOString().split('T')[0],
          slot:         '10:00 AM',
          duration:     2,
          guests:       3,
          price:        499,
          ownerId:      '',
          listingId:    ''
        };
      }
      populateBookingUI();
    });

    function populateBookingUI() {
      const subtotal = booking.price * booking.duration;
      const fee      = Math.round(subtotal * 0.10);
      const total    = subtotal + fee;

      document.getElementById('blsTitle').textContent     = booking.listingTitle || booking.title;
      document.getElementById('bdgDate').textContent      = formatDate(booking.date);
      document.getElementById('bdgTime').textContent      = booking.slot;
      document.getElementById('bdgDuration').textContent  = booking.duration + ' hour' + (booking.duration > 1 ? 's' : '');
      document.getElementById('bdgGuests').textContent    = booking.guests + ' guest' + (booking.guests > 1 ? 's' : '');
      document.getElementById('bpbRateLabel').textContent = '₹' + booking.price + ' × ' + booking.duration + ' hour' + (booking.duration > 1 ? 's' : '');
      document.getElementById('bpbSubtotal').textContent  = '₹' + subtotal;
      document.getElementById('bpbFee').textContent       = '₹' + fee;
      document.getElementById('bpbTotal').textContent     = '₹' + total;
      document.getElementById('amountDue').textContent    = '₹' + total;
      document.getElementById('payBtnAmount').textContent = total;
      document.getElementById('bspTitle').textContent     = booking.listingTitle || booking.title;
      document.getElementById('bspDate').textContent      = formatDate(booking.date);
      document.getElementById('bspTime').textContent      = booking.slot;
      document.getElementById('bspDuration').textContent  = booking.duration + ' hr' + (booking.duration > 1 ? 's' : '');
      document.getElementById('bspGuests').textContent    = booking.guests;
      document.getElementById('bspRateLabel').textContent = '₹' + booking.price + ' × ' + booking.duration + 'hr';
      document.getElementById('bspSubtotal').textContent  = '₹' + subtotal;
      document.getElementById('bspFee').textContent       = '₹' + fee;
      document.getElementById('bspTotal').textContent     = '₹' + total;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      return new Date(dateStr).toLocaleDateString('en-IN', {
        weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'
      });
    }

    function goToStep(step) {
      document.querySelectorAll('.booking-card').forEach(c => c.style.display = 'none');
      document.getElementById('bStep' + step).style.display = 'block';
      for (let i = 1; i <= 3; i++) {
        const el = document.getElementById('bp' + i);
        el.classList.toggle('active', i === step);
        el.classList.toggle('done',   i < step);
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    let selectedPayment = 'razorpay';
    function selectPayment(method, btn) {
      document.querySelectorAll('.payment-method').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedPayment = method;
      document.getElementById('razorpaySection').style.display = method === 'razorpay' ? 'block' : 'none';
      document.getElementById('upiSection').style.display      = method === 'upi'      ? 'block' : 'none';
      document.getElementById('pmCheck1').style.display        = method === 'razorpay' ? 'inline': 'none';
      document.getElementById('pmCheck2').style.display        = method === 'upi'      ? 'inline': 'none';
    }

    function goToPayment() {
      const agreed = document.getElementById('agreeRules').checked;
      const error  = document.getElementById('reviewError');
      if (!agreed) { error.textContent = 'Please agree to the house rules to continue.'; return; }
      error.textContent = '';
      goToStep(2);
    }

    // ── REAL RAZORPAY PAYMENT ──
    async function initiatePayment() {
      const btn   = document.getElementById('payBtn');
      const error = document.getElementById('paymentError');
      error.textContent = '';

      if (selectedPayment === 'upi') {
        const upiId = document.getElementById('upiId').value.trim();
        if (!upiId || !upiId.includes('@')) {
          error.textContent = 'Please enter a valid UPI ID.'; return;
        }
      }

      btn.textContent = '⏳ Creating order...';
      btn.disabled    = true;

      const user = firebase.auth().currentUser;
      if (!user) {
        error.textContent = '❌ Please log in to make a payment.';
        btn.textContent = '🔒 Pay ₹' + document.getElementById('payBtnAmount').textContent + ' Securely';
        btn.disabled    = false;
        return;
      }

      const subtotal = booking.price * booking.duration;
      const fee      = Math.round(subtotal * 0.10);
      const total    = subtotal + fee;

      try {
        const idToken = await user.getIdToken();

        // Create Razorpay order via backend
        const orderRes = await fetch(`${BACKEND_URL}/payment/create-order`, {
          method:  'POST',
          headers: {
            'Content-Type':  'application/json',
            'Authorization': `Bearer ${idToken}`
          },
          body: JSON.stringify({
            amount:       total,
            listingTitle: booking.listingTitle || booking.title,
            userId:       user.uid
          })
        });

        const orderData = await orderRes.json();
        if (!orderData.orderId) throw new Error('Order creation failed');

        // Open Razorpay checkout
        const options = {
          key:      orderData.keyId,
          amount:   orderData.amount,
          currency: orderData.currency,
          name:     'MicroLease',
          description: booking.listingTitle || 'Amenity Booking',
          order_id: orderData.orderId,
          handler: async function(response) {
            await verifyAndSavePayment(response, orderData.orderId, user, idToken, total);
          },
          prefill: {
            name:    user.displayName || '',
            email:   user.email || '',
            contact: ''
          },
          theme:  { color: '#1a56db' },
          modal: {
            ondismiss: function() {
              btn.textContent = '🔒 Pay ₹' + total + ' Securely';
              btn.disabled    = false;
              error.textContent = 'Payment cancelled.';
            }
          }
        };

        const rzp = new Razorpay(options);
        rzp.open();

      } catch(err) {
        console.warn('Backend not reachable, using demo mode:', err.message);
        // DEMO FALLBACK — works without backend for testing
        btn.textContent = '⏳ Processing (Demo)...';
        setTimeout(() => onPaymentSuccess('demo_' + Date.now(), total), 2000);
      }
    }

    // ── VERIFY PAYMENT SIGNATURE VIA BACKEND ──
    async function verifyAndSavePayment(rzpResponse, orderId, user, idToken, total) {
      try {
        const verifyRes = await fetch(`${BACKEND_URL}/payment/verify`, {
          method:  'POST',
          headers: {
            'Content-Type':  'application/json',
            'Authorization': `Bearer ${idToken}`
          },
          body: JSON.stringify({
            razorpay_order_id:   orderId,
            razorpay_payment_id: rzpResponse.razorpay_payment_id,
            razorpay_signature:  rzpResponse.razorpay_signature,
            userId: user.uid,
            bookingData: {
              ownerId:      booking.ownerId,
              listingId:    booking.listingId,
              listingTitle: booking.listingTitle || booking.title,
              date:         booking.date,
              slot:         booking.slot,
              duration:     booking.duration,
              guests:       booking.guests,
              total:        total,
            }
          })
        });

        const result = await verifyRes.json();
        if (result.success) {
          firestoreBookingId = result.bookingId;
          localStorage.setItem('currentBookingId', firestoreBookingId);
          onPaymentSuccess(result.paymentId, total);
        } else {
          throw new Error(result.error || 'Verification failed');
        }
      } catch(err) {
        console.error('Payment verification error:', err);
        // Still proceed — payment was captured by Razorpay
        onPaymentSuccess(rzpResponse.razorpay_payment_id, total);
      }
    }

    // ── PAYMENT SUCCESS → SHOW STEP 3 ──
    function onPaymentSuccess(paymentId, total) {
      const bookingId = 'ML-' + Date.now().toString().slice(-6);
      document.getElementById('bookingId').textContent  = bookingId;
      document.getElementById('cdDate').textContent     = formatDate(booking.date);
      document.getElementById('cdTime').textContent     = booking.slot;
      document.getElementById('cdDuration').textContent = booking.duration + ' hour' + (booking.duration > 1 ? 's' : '');
      document.getElementById('cdAmount').textContent   = '₹' + (total || booking.price * booking.duration + Math.round(booking.price * booking.duration * 0.1));
      localStorage.removeItem('pendingBooking');
      goToStep(3);
    }

    // ── CONFIRM ARRIVAL — calls backend escrow release ──
    async function confirmArrivalUI() {
      const btn = document.getElementById('confirmArrivalBtn');
      btn.textContent = '⏳ Confirming...';
      btn.disabled    = true;

      const bookingId = firestoreBookingId || localStorage.getItem('currentBookingId');
      const user      = firebase.auth().currentUser;

      if (bookingId && user) {
        try {
          const idToken   = await user.getIdToken();
          const response  = await fetch(`${BACKEND_URL}/escrow/release`, {
            method:  'POST',
            headers: {
              'Content-Type':  'application/json',
              'Authorization': `Bearer ${idToken}`
            },
            body: JSON.stringify({ bookingId, userId: user.uid })
          });
          const result = await response.json();
          if (!result.success) throw new Error(result.error);
        } catch(err) {
          console.warn('Escrow release via backend failed, using direct Firestore:', err.message);
          // Fallback to direct Firestore
          try { await confirmArrival_db(bookingId); } catch(e) {}
        }
      }

      localStorage.removeItem('currentBookingId');
      btn.textContent      = '✅ Arrival Confirmed!';
      btn.style.background = '#059669';
      document.querySelectorAll('.esb-state').forEach((s, i) => {
        if (i === 0) { s.classList.remove('active'); s.classList.add('done'); }
        if (i === 2) { s.classList.remove('pending'); s.classList.add('active'); }
      });
      showToast('✅ Arrival confirmed! Funds released to owner.');
    }

    // ── REPORT FAKE — calls backend escrow refund ──
    async function reportFakeUI() {
      const confirmed = confirm(
        'Report this listing as fake?\n\nYour payment will be refunded.'
      );
      if (!confirmed) return;

      const bookingId = firestoreBookingId || localStorage.getItem('currentBookingId');
      const user      = firebase.auth().currentUser;

      if (bookingId && user) {
        try {
          const idToken  = await user.getIdToken();
          const response = await fetch(`${BACKEND_URL}/escrow/refund`, {
            method:  'POST',
            headers: {
              'Content-Type':  'application/json',
              'Authorization': `Bearer ${idToken}`
            },
            body: JSON.stringify({
              bookingId,
              userId: user.uid,
              reason: 'Fake or misrepresented listing'
            })
          });
          const result = await response.json();
          if (!result.success) throw new Error(result.error);
        } catch(err) {
          console.warn('Escrow refund via backend failed, using Firestore:', err.message);
          try { await reportFakeListing_db(bookingId, booking.listingId, 'Fake listing'); } catch(e) {}
        }
      }

      localStorage.removeItem('currentBookingId');
      showToast('🔄 Report submitted. Refund processing.');
    }

    function showToast(msg) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className   = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }
</script>
